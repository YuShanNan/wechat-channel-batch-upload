<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频号上传</title>
<style>
  :root {
    --green: #07c160; --green-hover: #06ad50; --red: #e74c3c;
    --bg: #f0f2f5; --card: #fff; --text: #1a1a1a; --text2: #888;
    --border: #e5e5e5; --shadow: 0 1px 3px rgba(0,0,0,.06); --radius: 8px;
    --label: #555; --hover-bg: #f0faf4; --bar-track: #e9ecef;
    --overlay-bg: rgba(0,0,0,.3); --badge-done-bg: #d4edda; --badge-done-text: #155724;
    --badge-fail-bg: #f8d7da; --badge-fail-text: #721c24;
  }
  [data-theme="dark"] {
    --bg: #1a1a1c; --card: #2a2a2d; --text: #e0e0e0; --text2: #999;
    --border: #3a3a3d; --shadow: 0 1px 3px rgba(0,0,0,.4);
    --label: #aaa; --hover-bg: #1a3a1a; --bar-track: #3a3a3d;
    --overlay-bg: rgba(0,0,0,.6); --badge-done-bg: #1a3a1a; --badge-done-text: #7ddf90;
    --badge-fail-bg: #3a1a1a; --badge-fail-text: #df7d7d;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:15px}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  .main{max-width:1060px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 340px;gap:24px}
  .left,.right{display:flex;flex-direction:column;gap:16px}
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
  .card-title{font-size:13px;font-weight:500;color:var(--label);margin-bottom:8px}

  /* 拖拽区 */
  .dropzone{
    border:2px dashed var(--border);border-radius:var(--radius);
    padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  }
  .dropzone.dragover{border-color:var(--green);background:var(--hover-bg)}
  .dropzone.has-file{border-style:solid;border-color:var(--green)}
  .dropzone .dz-icon{font-size:32px;color:var(--text2)}
  .dropzone .dz-title{font-size:14px;font-weight:500}
  .dropzone .dz-hint{font-size:11px;color:var(--text2)}
  .dropzone .dz-file{font-size:12px;color:var(--green);word-break:break-all}
  .dropzone .dz-progress{height:4px;background:var(--bar-track);border-radius:2px;margin-top:8px;width:100%;overflow:hidden}
  .dropzone .dz-progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .2s}

  /* 封面 */
  .cover-drop{
    border:2px dashed var(--border);border-radius:var(--radius);
    padding:20px 16px;text-align:center;cursor:pointer;transition:all .2s;
    min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  }
  .cover-drop.dragover{border-color:var(--green);background:var(--hover-bg)}
  .cover-drop.has-file{border-style:solid;border-color:var(--green)}
  .cover-drop .cv-label{font-size:12px;color:var(--text2)}
  .cover-drop .cv-ratio{font-size:11px;color:var(--text2)}
  .cover-drop .cv-file{font-size:11px;color:var(--green);word-break:break-all}
  .cover-drop img.cover-thumb{max-width:100%;height:auto;border-radius:6px}

  /* 预览 */
  .preview-wrap{display:none;position:relative;width:100%;height:300px;border-radius:6px;overflow:hidden;background:#000;cursor:pointer}
  .preview-wrap.show{display:block}
  .video-preview{display:block;width:100%;height:calc(100% - 32px);object-fit:contain}
  .preview-ctrls{display:flex;align-items:center;gap:8px;padding:4px 10px;height:32px;background:rgba(0,0,0,.7)}
  .preview-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:14px;padding:2px 6px;line-height:1;font-family:inherit}
  .preview-btn:hover{color:var(--green)}
  .preview-bar{flex:1;height:12px;cursor:pointer;position:relative;display:flex;align-items:center}
  .preview-bar-track{width:100%;height:4px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden}
  .preview-bar-fill{height:4px;background:var(--green);border-radius:2px;transition:width .1s linear}

  /* 横向队列卡片 */
  .queue-row{display:flex;flex-wrap:wrap;gap:10px}
  .queue-row>[id^="qw-"]{transition:transform .25s ease}
  .queue-card{
    border-radius:6px;overflow:hidden;cursor:pointer;position:relative;
    border:2px solid transparent;transition:border-color .15s,height .3s ease,transform .25s ease;
    flex-shrink:0;
  }
  .queue-card:hover{border-color:var(--border)}
  .queue-card.active{border-color:var(--green)}
  .queue-card.dragging{opacity:.4}
  .queue-card .qc-thumb{width:100%;height:100%;object-fit:cover;display:block;background:#000}
  .queue-card .qc-remove{
    position:absolute;top:2px;right:2px;
    width:18px;height:18px;border-radius:50%;
    background:rgba(0,0,0,.55);color:#fff;
    font-size:11px;line-height:18px;text-align:center;
    cursor:pointer;display:none;
  }
  .queue-card:hover .qc-remove{display:block}
  .queue-card .qc-remove:hover{background:var(--red)}
  .queue-card .qc-status{
    position:absolute;top:2px;left:2px;
    padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600;
  }
  .queue-card .qc-status.done{background:var(--badge-done-bg);color:var(--badge-done-text)}
  .queue-card .qc-status.fail{background:var(--badge-fail-bg);color:var(--badge-fail-text)}
  .qc-name{
    font-size:11px;color:var(--text2);text-align:center;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    max-width:140px;margin-top:4px;
  }

  /* 表单 */
  .form-group{display:flex;flex-direction:column;gap:4px}
  .form-group label{font-size:13px;font-weight:500;color:var(--label)}
  .form-group input:not([type=radio]):not([type=checkbox]),.form-group textarea{
    padding:10px 12px;border:1px solid var(--border);border-radius:6px;
    font-size:14px;font-family:inherit;outline:none;width:100%;transition:border-color .2s;
    background:var(--card);color:var(--text);
  }
  .form-group textarea{min-height:80px;resize:vertical}
  .form-group input:focus,.form-group textarea:focus{border-color:var(--green)}

  .radio-row{display:flex;gap:16px;padding:8px 0;align-items:center}
  .radio-row label{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px}
  .radio-row input[type=radio]{accent-color:var(--green)}

  .acct-select{display:none}
  /* 自定义下拉 */
  .cust-select{position:relative;flex:1}
  .cust-trigger{display:flex;align-items:center;justify-content:space-between;padding:6px 10px 6px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;background:var(--card);cursor:pointer;user-select:none;transition:border-color .2s;min-height:34px}
  .cust-trigger:hover{border-color:var(--green)}
  .cust-trigger.open{border-color:var(--green)}
  .cust-trigger .cust-arrow{transition:transform .2s;color:var(--text2)}
  .cust-trigger.open .cust-arrow{transform:rotate(180deg)}
  .cust-dropdown{display:none;position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--card);border:1px solid var(--border);border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:50;max-height:200px;overflow-y:auto}
  .cust-dropdown.show{display:block}
  .cust-option{padding:8px 12px;font-size:14px;font-family:inherit;cursor:pointer;transition:background .1s}
  .cust-option:hover{background:var(--hover-bg)}
  .cust-option.selected{color:var(--green);font-weight:500}

  .btn{padding:10px 24px;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-publish{background:var(--green);color:#fff;width:100%}
  .btn-publish:hover:not(:disabled){background:var(--green-hover)}

  /* overlay */
  .overlay{display:none;position:fixed;inset:0;background:var(--overlay-bg);z-index:100;align-items:center;justify-content:center}
  .overlay.show{display:flex}
  .overlay .modal{background:var(--card);border-radius:12px;padding:32px;text-align:center;max-width:400px;width:90%}
  .overlay .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .overlay .status-text{font-size:15px;color:var(--text)}
  .overlay .progress-bar{height:6px;background:var(--bar-track);border-radius:3px;overflow:hidden;margin:8px 0}
  .overlay .progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
  .overlay .progress-text{font-size:12px;color:var(--text2)}
  .overlay .log-text{font-size:12px;color:var(--text2);margin-top:8px;white-space:pre-wrap}

  .toast{position:fixed;top:20px;right:20px;background:#333;color:#fff;padding:10px 20px;border-radius:6px;font-size:13px;z-index:999;animation:slideIn .3s ease}
  @keyframes slideIn{from{transform:translateX(100px);opacity:0}}

  /* 账号管理 */
  .acct-row{display:flex;gap:6px}
  .acct-row .acct-select{flex:1}
  .btn-sm{padding:6px 12px;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
  .btn-mgmt{background:var(--border);color:var(--label);white-space:nowrap}
  .btn-mgmt:hover{background:var(--border)}
  .acct-overlay{display:none;position:fixed;inset:0;background:var(--overlay-bg);z-index:101;align-items:center;justify-content:center}
  .acct-overlay.show{display:flex}
  .acct-overlay .modal{background:var(--card);border-radius:12px;padding:28px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto}
  .acct-overlay .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .acct-overlay .modal-header h2{font-size:17px;font-weight:600}
  .acct-overlay .modal-close{background:none;border:none;font-size:20px;color:var(--text2);cursor:pointer;padding:0;line-height:1}
  .acct-overlay .modal-close:hover{color:var(--text)}
  .acct-add-form{display:flex;gap:8px;margin-bottom:16px}
  .acct-add-form input{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;outline:none;flex:1;min-width:0}
  .acct-add-form input:focus{border-color:var(--green)}
  .acct-table{width:100%;border-collapse:collapse;font-size:13px}
  .acct-table th,.acct-table td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
  .acct-table th{font-weight:500;color:var(--text2);font-size:11px}
  .acct-table td{color:var(--text)}
  .acct-table .acct-actions{display:flex;gap:6px}
  .acct-empty{padding:24px;text-align:center;color:var(--text2);font-size:13px}

  .debug-toggle{position:fixed;left:8px;bottom:8px;font-size:10px;color:var(--text2);cursor:pointer;user-select:none;z-index:200;transition:color .2s}
  .debug-toggle:hover{color:var(--label)}
  .debug-toggle.active{color:var(--green)}

  /* 二维码弹窗 */
  .qrcode-overlay{display:none;position:fixed;inset:0;background:var(--overlay-bg);z-index:102;align-items:center;justify-content:center}
  .qrcode-overlay.show{display:flex}
  .qrcode-modal{background:var(--card);border-radius:12px;padding:32px;text-align:center;max-width:360px;width:90%;position:relative}
  #qrcode-img{width:220px;height:220px;border:1px solid var(--border);border-radius:8px;object-fit:contain}
  .qrcode-status{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;font-size:14px;color:var(--label)}
  .qrcode-spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
  .qrcode-close{position:absolute;top:12px;right:12px;background:none;border:none;font-size:20px;color:var(--text2);cursor:pointer;line-height:1}
  .qrcode-close:hover{color:var(--text)}

  /* 表单统一 */
  input[type="datetime-local"],input[type="number"]{padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;outline:none;width:100%;transition:border-color .2s;background:var(--card);color:var(--text)}
  input[type="datetime-local"]:focus,input[type="number"]:focus{border-color:var(--green)}
  input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input[type="number"]{-moz-appearance:textfield}
  /* 按钮变体 */
  .btn-danger{background:var(--red);color:#fff}
  .btn-danger:hover{background:#c0392b}
  .btn-full{width:100%}

  .theme-toggle{position:fixed;top:12px;right:12px;background:none;border:1px solid var(--border);border-radius:6px;font-size:14px;padding:4px 8px;cursor:pointer;color:var(--text);z-index:200;font-family:inherit;transition:all .15s}
  .theme-toggle:hover{background:var(--hover-bg)}

  @media(max-width:800px){.main{grid-template-columns:1fr}}
</style>
</head>
<body>

<button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="切换暗色模式">🌙</button>

<div class="main">
  <div class="left">
    <!-- 视频拖入 -->
    <div class="card">
      <div class="dropzone" id="video-dz">
        <div class="dz-icon">+</div>
        <div class="dz-title">拖拽或点击选择视频</div>
        <div class="dz-hint">MP4/H.264，不超过 20GB，支持多选</div>
      </div>
      <input type="file" id="video-input" accept="video/mp4,video/*" multiple style="display:none">
    </div>

    <!-- 视频预览 -->
    <div class="card" id="preview-card" style="display:none">
      <div class="preview-wrap" id="preview-wrap">
        <video class="video-preview" id="video-preview-a" onclick="togglePreviewPlay()" style="display:none"></video>
        <video class="video-preview" id="video-preview-b" onclick="togglePreviewPlay()" style="display:none"></video>
        <div class="preview-ctrls">
          <button class="preview-btn" id="preview-play-btn" onclick="togglePreviewPlay()">▶</button>
          <div class="preview-bar" id="preview-bar" onclick="seekPreview(event)">
            <div class="preview-bar-track"><div class="preview-bar-fill" id="preview-bar-fill" style="width:0%"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 队列 -->
    <div class="card">
      <div class="card-title">上传队列 (<span id="queue-count">0</span>)</div>
      <div class="queue-row" id="queue-row"></div>
    </div>
  </div>

  <div class="right">
    <!-- 封面 -->
    <div class="card">
      <div class="card-title">封面</div>
      <div class="cover-drop" id="cover-dz">
        <div class="cv-label">个人主页封面</div>
        <div class="cv-ratio">3:4</div>
      </div>
      <input type="file" id="cover-input" accept="image/png,image/jpeg,image/webp" style="display:none">
    </div>

    <!-- 表单 -->
    <div class="card" style="flex:1">
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="form-group">
          <label>描述</label>
          <textarea id="form-desc" placeholder="添加描述 #话题 &commat;视频号"></textarea>
        </div>
        <div class="form-group">
          <label>短标题</label>
          <input id="form-title" placeholder="概括视频主要内容，6-16字" maxlength="20">
        </div>
        <div class="form-group">
          <label>短剧名称</label>
          <input id="form-drama" placeholder="输入短剧名称">
        </div>
        <div class="form-group">
          <label>定时开始上传</label>
          <div class="radio-row">
            <label><input type="radio" name="schedule" value="now" checked onchange="toggleSchedule()">不定时</label>
            <label><input type="radio" name="schedule" value="scheduled" onchange="toggleSchedule()">定时</label>
          </div>
          <input type="datetime-local" id="form-time" style="display:none">
        </div>
        <div class="form-group">
          <label>发布间隔（分钟）</label>
          <input type="number" id="form-interval" value="0" min="0" max="1440" placeholder="0 = 无间隔">
        </div>
        <div style="font-size:13px;color:var(--text2)">位置: 不显示</div>
        <div class="form-group">
          <label>账号</label>
          <div class="acct-row">
            <select class="acct-select" id="account-select"><option value="">选择账号…</option></select>
	            <div class="cust-select" id="account-select-wrap">
	              <div class="cust-trigger" id="account-select-trigger" onclick="toggleCustSelect()">
	                <span class="cust-text">选择账号…</span>
	                <svg class="cust-arrow" width="12" height="12" viewBox="0 0 12 12"><path d="M3 5l3 3 3-3" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
	              </div>
	              <div class="cust-dropdown" id="account-select-dropdown"></div>
	            </div>
            <button class="btn-sm btn-mgmt" onclick="openAccountManager()">管理</button>
          </div>
        </div>
      </div>
    </div>
    <button class="btn btn-publish" id="btn-publish" onclick="startUpload()">发表</button>
  </div>
</div>

<div class="acct-overlay" id="acct-overlay" onclick="closeAccountManager()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2>账号管理</h2>
      <button class="modal-close" onclick="closeAccountManager()">✕</button>
    </div>
    <div class="acct-add-form">
      <button class="btn-sm btn-full" style="background:var(--green);color:#fff;padding:10px;font-size:14px" onclick="addAccount()">添加账号（扫码自动获取昵称）</button>
    </div>
    <table class="acct-table">
      <thead><tr><th>昵称</th><th>最后登录</th><th>操作</th></tr></thead>
      <tbody id="acct-tbody"></tbody>
    </table>
    <div class="acct-empty" id="acct-empty" style="display:none">暂无账号，请添加</div>
  </div>
</div>

<div class="qrcode-overlay" id="qrcode-overlay">
  <div class="qrcode-modal">
    <button class="qrcode-close" onclick="cancelScan()">✕</button>
    <img id="qrcode-img" src="" alt="微信扫码登录" style="display:none">
    <div class="qrcode-status">
      <div class="qrcode-spinner" id="qrcode-spinner"></div>
      <span id="qrcode-status-text">正在获取二维码...</span>
    </div>
    <button class="btn btn-danger btn-full" style="margin-top:16px" onclick="cancelScan()">取消</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="spinner" id="spinner"></div>
    <div class="status-text" id="status-text">准备上传…</div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="progress-bar" style="flex:1"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <span id="progress-pct" style="font-size:12px;color:var(--text2);min-width:36px;text-align:right">0%</span>
    </div>
    <div class="progress-text" id="progress-text"></div>
    <div class="log-text" id="log-text"></div>
    <button class="btn btn-danger btn-full" style="margin-top:16px" onclick="cancelUpload()">取消上传</button>
  </div>
</div>

<script>
let accounts=[], videoQueue=[], currentCoverPath='';

// ==================== 账号 ====================
async function loadAccounts(){
  const res=await fetch('/api/accounts'); const data=await res.json();
  accounts=data.accounts||[];
  refreshSelect();
  refreshAccountTable();
}
loadAccounts();

function refreshSelect(){
  const sel=document.getElementById('account-select');
  const cur=sel.value;
  sel.innerHTML='<option value="">选择账号…</option>'+
    accounts.map(a=>`<option value="${a.name}">${a.nickname||a.name}</option>`).join('');
  sel.value=accounts.some(a=>a.name===cur)?cur:'';
  refreshCustSelect();
}

function refreshAccountTable(){
  const tbody=document.getElementById('acct-tbody');
  const empty=document.getElementById('acct-empty');
  if(!accounts.length){
    tbody.innerHTML='';
    empty.style.display='';
    return;
  }
  empty.style.display='none';
  tbody.innerHTML=accounts.map(a=>`<tr>
    <td>${esc(a.nickname||'')}</td>
    <td>${esc(a.last_login||'未登录')}</td>
    <td><div class="acct-actions">
      ${a.last_login
        ? `<button class="btn-sm btn-mgmt" onclick="openDashboard('${esc(a.name)}')">后台</button>`
        : `<button class="btn-sm btn-mgmt" onclick="loginAccount('${esc(a.name)}')">登录</button>`
      }
      <button class="btn-sm btn-danger" onclick="deleteAccount('${esc(a.name)}')">删除</button>
    </div></td>
  </tr>`).join('');
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;')}

function openAccountManager(){
  document.getElementById('acct-overlay').classList.add('show');
  refreshAccountTable();
}
function closeAccountManager(){
  document.getElementById('acct-overlay').classList.remove('show');
}

let qrcodeTimer=null;

function openQrcodeModal(){
  document.getElementById('qrcode-overlay').classList.add('show');
  document.getElementById('qrcode-img').style.display='none';
  document.getElementById('qrcode-spinner').style.display='';
  document.getElementById('qrcode-status-text').textContent='正在获取二维码...';
}

function closeQrcodeModal(){
  document.getElementById('qrcode-overlay').classList.remove('show');
  if(qrcodeTimer){clearTimeout(qrcodeTimer);qrcodeTimer=null}
}

async function cancelScan(){
  await fetch('/api/accounts/add-with-scan/cancel',{method:'POST'});
  closeQrcodeModal();
}

async function addAccount(){
  openQrcodeModal();
  const res=await fetch('/api/accounts/add-with-scan',{method:'POST'});
  const data=await res.json();
  if(data.error){
    document.getElementById('qrcode-status-text').textContent=data.error;
    setTimeout(closeQrcodeModal,2000);
    return;
  }
  pollQrcodeStatus();
}

const _qrcodeStatusMap={
  loading:'正在获取二维码...',
  waiting:'请使用微信扫描二维码',
  scanned:'请使用微信扫描二维码',
  confirming:'请使用微信扫描二维码',
  expired:'二维码已过期，正在刷新...',
  logged_in:'登录成功！',
  timeout:'登录超时',
  cancelled:'已取消',
};

async function pollQrcodeStatus(){
  const sr=await fetch('/api/accounts/add-with-scan/status');
  const st=await sr.json();
  const img=document.getElementById('qrcode-img');
  const spinner=document.getElementById('qrcode-spinner');
  const statusText=document.getElementById('qrcode-status-text');

  if(st.qrcode){
    img.src=st.qrcode;
    img.style.display='';
    spinner.style.display='none';
  }
  statusText.textContent=_qrcodeStatusMap[st.status]||st.status;

  if(!st.scanning){
    spinner.style.display='none';
    if(st.result&&st.result.success){
      await loadAccounts();
      setTimeout(closeQrcodeModal,1500);
    }else{
      setTimeout(closeQrcodeModal,3000);
    }
    return;
  }
  qrcodeTimer=setTimeout(pollQrcodeStatus,1000);
}

async function deleteAccount(name){
  if(!confirm(`确定删除账号 ${name}？此操作不删除浏览器数据。`))return;
  await fetch('/api/accounts/'+encodeURIComponent(name),{method:'DELETE'});
  await loadAccounts();
  toast('已删除');
}

async function openDashboard(name){
  const res=await fetch('/api/accounts/'+encodeURIComponent(name)+'/dashboard',{method:'POST'});
  const data=await res.json();
  if(data.error){toast(data.error);return}
  toast('后台打开中');
}

async function loginAccount(name){
  const res=await fetch('/api/accounts/'+encodeURIComponent(name)+'/login',{method:'POST'});
  const data=await res.json();
  if(data.error){toast(data.error);return}
  toast('网页打开中，请稍等');
  let lastSeen=null;
  for(let i=0;i<60;i++){
    await new Promise(r=>setTimeout(r,3000));
    await loadAccounts();
    const acct=accounts.find(a=>a.name===name);
    const cur=acct?acct.last_login:'';
    if(cur&&cur!==lastSeen){lastSeen=cur;refreshAccountTable()}
    if(cur&&cur!=='')break;
  }
}

const videoDz=document.getElementById('video-dz');

videoDz.addEventListener('click',()=>videoInput.click());
videoDz.addEventListener('dragover',e=>{e.preventDefault();videoDz.classList.add('dragover')});
videoDz.addEventListener('dragleave',()=>videoDz.classList.remove('dragover'));
videoDz.addEventListener('drop',async e=>{
  e.preventDefault();videoDz.classList.remove('dragover');
  await uploadFiles(e.dataTransfer.files,'video');
});
videoInput.addEventListener('change',async()=>{
  await uploadFiles(videoInput.files,'video'); videoInput.value='';

async function uploadFiles(files,type){
  const newVideos=[];
  for(const f of files){
    if(type==='video'&&!f.type.startsWith('video/'))continue;
    if(type==='cover'&&!f.type.startsWith('image/'))continue;

    videoDz.innerHTML=`<div class="dz-file">上传中: ${f.name}</div><div class="dz-progress"><div class="dz-progress-fill" id="dz-pct" style="width:0%"></div></div>`;
    videoDz.classList.add('has-file');

    const form=new FormData();form.append('file',f);
    let res;
    try{
      res=await new Promise((resolve,reject)=>{
        const xhr=new XMLHttpRequest();
        xhr.upload.onprogress=e=>{
          if(e.lengthComputable){
            const pct=Math.round(e.loaded/e.total*100);
            const el=document.getElementById('dz-pct');
            if(el)el.style.width=pct+'%';
          }
        };
        xhr.onload=()=>{try{resolve(JSON.parse(xhr.responseText))}catch(e){reject(e)}};
        xhr.onerror=()=>reject(new Error('上传失败'));
        xhr.open('POST','/api/upload-temp');xhr.send(form);
      });
    }catch(e){toast('上传失败: '+e.message);continue}

    if(res.error){toast(res.error);continue}
    if(res.path){
      if(type==='video'){
        newVideos.push({path:res.path,name:res.name,status:'',cardHeight:null});
      }else{
        setCoverData(res.path,res.name);
      }
    }
  }
  // 全部上传完后一次性加入队列，重置拖拽区
  if(newVideos.length>0){
    videoQueue.push(...newVideos);
  }
  videoDz.classList.remove('has-file');
  videoDz.innerHTML='<div class="dz-icon">+</div><div class="dz-title">拖拽或点击选择视频</div><div class="dz-hint">MP4/H.264，不超过 20GB，支持多选</div>';
  renderQueue();
}

// ==================== 队列渲染 ====================
function renderQueue(){
  const row=document.getElementById('queue-row');
  const countEl=document.getElementById('queue-count');
  const previewCard=document.getElementById('preview-card');
  countEl.textContent=videoQueue.length;

  if(videoQueue.length===0){
    row.innerHTML='';
    previewCard.style.display='none';
    return;
  }
  previewCard.style.display='';

  const W=140;
  row.innerHTML=videoQueue.map((v,i)=>{
    const cls=v.status==='done'?'done':v.status==='fail'?'fail':'';
    const src=v.path?`/api/preview/${encodeURIComponent(v.path)}`:'';
    const h=v.cardHeight||78;
    return `<div id="qw-${i}" style="display:flex;flex-direction:column;align-items:center;gap:2px" onclick="updatePreview(${i})" draggable="true" onDragStart="onDragStart(event,${i})" onDragOver="onDragOver(event)" onDrop="onDrop(event,${i})" onDragEnd="onDragEnd(event)">
      <div class="queue-card${i===0?' active':''}" id="qc-${i}" style="width:${W}px;height:${h}px">
        ${src?`<video class="qc-thumb" id="qcv-${i}" src="${src}" preload="metadata" muted onloadedmetadata="setCardHeight(this,document.getElementById('qc-'+${i}),${i})"></video>`:`<div class="qc-thumb" id="qcv-${i}" style="display:flex;align-items:center;justify-content:center;color:#666;font-size:11px">...</div>`}
        ${cls?`<div class="qc-status ${cls}">${cls==='done'?'✓':'✗'}</div>`:''}
        <div class="qc-remove" onclick="event.stopPropagation();removeFromQueue(${i})">✕</div>
      </div>
      <div class="qc-name" title="${v.name}">${v.name}</div>
    </div>`;
  }).join('');

  // 默认用存储高度，未加载过 metadata 的不主动加载（延迟到点击时）
  videoQueue.forEach((v,i)=>{
    if(v.cardHeight){
      const card=document.getElementById('qc-'+i);
      if(card)card.style.height=v.cardHeight+'px';
    }
  });

  if(videoQueue.length>0&&!document.getElementById('preview-wrap').classList.contains('show'))updatePreview(0);
}

function setCardHeight(vel,card,i){
  const W=140;
  const vw=vel.videoWidth,vh=vel.videoHeight;
  if(vw&&vh){
    const h=Math.round(W*vh/vw);
    card.style.height=h+'px';
    videoQueue[i].cardHeight=h;
  }
}

function removeFromQueue(i){
  videoQueue.splice(i,1);
  renderQueue();
}

let dragIdx=null;
function onDragStart(e,i){
  dragIdx=i;
  document.getElementById('qc-'+i).classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function onDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move'}
function onDrop(e,i){
  e.preventDefault();
  if(dragIdx===null||dragIdx===i)return;

  // 直接移动 DOM 节点，不重建（避免 video 重新加载闪黑）
  const row=document.getElementById('queue-row');
  const wrappers=[...row.querySelectorAll('[id^="qw-"]')];
  const srcEl=document.getElementById('qw-'+dragIdx);
  const tgtEl=document.getElementById('qw-'+i);
  if(!srcEl||!tgtEl)return;

  // FLIP: 记录所有卡片旧位置
  const oldRects=wrappers.map(el=>el.getBoundingClientRect());

  // 移动 DOM 节点
  if(dragIdx<i){
    tgtEl.after(srcEl);
  }else{
    tgtEl.before(srcEl);
  }

  // 重排数组
  const [item]=videoQueue.splice(dragIdx,1);
  videoQueue.splice(i,0,item);

  // 更新所有 wrapper 的 id 和事件处理（索引变了）
  const newWrappers=[...row.querySelectorAll('[id^="qw-"]')];
  newWrappers.forEach((w,idx)=>{
    w.id='qw-'+idx;
    w.setAttribute('draggable','true');
    w.setAttribute('ondragstart','onDragStart(event,'+idx+')');
    w.setAttribute('ondrop','onDrop(event,'+idx+')');
    w.setAttribute('onclick','updatePreview('+idx+')');
    w.querySelector('.queue-card').id='qc-'+idx;
    w.querySelector('.qc-name').setAttribute('onclick','');
    w.querySelector('.qc-remove')?.setAttribute('onclick','event.stopPropagation();removeFromQueue('+idx+')');
    const thumb=w.querySelector('.qc-thumb');
    if(thumb)thumb.id='qcv-'+idx;
  });

  // 更新计数
  document.getElementById('queue-count').textContent=videoQueue.length;

  // FLIP 动画
  requestAnimationFrame(()=>{
    [...row.querySelectorAll('[id^="qw-"]')].forEach((w,j)=>{
      if(j>=oldRects.length)return;
      const nr=w.getBoundingClientRect();
      const dx=oldRects[j].left-nr.left;
      const dy=oldRects[j].top-nr.top;
      if(dx||dy){
        w.style.transition='none';
        w.style.transform=`translate(${dx}px,${dy}px)`;
        w.offsetHeight;
        w.style.transition='';
        w.style.transform='';
      }
    });
  });
}
function onDragEnd(e){
  if(dragIdx!==null){
    document.getElementById('qc-'+dragIdx)?.classList.remove('dragging');
  }
  dragIdx=null;
}

let activeV='a', loading=false;

function getActiveVideo(){return document.getElementById('video-preview-'+activeV)}
function getBackVideo(){return document.getElementById('video-preview-'+(activeV==='a'?'b':'a'))}

function updatePreview(i){
  const wrap=document.getElementById('preview-wrap');
  if(i===null||i>=videoQueue.length){wrap.classList.remove('show');return}
  const src=videoQueue[i].path?`/api/preview/${encodeURIComponent(videoQueue[i].path)}`:'';
  if(!src)return;

  wrap.classList.add('show');
  document.querySelectorAll('.queue-card').forEach((el,j)=>el.classList.toggle('active',j===i));
  document.getElementById('preview-play-btn').textContent='▶';
  document.getElementById('preview-bar-fill').style.width='0%';

  // 点卡片时触发该卡片 metadata 加载（之前 preload=none 跳过了）
  const qcv=document.getElementById('qcv-'+i);
  const qc=document.getElementById('qc-'+i);
  if(qcv&&qc&&!videoQueue[i].cardHeight){
    if(qcv.readyState>=1)setCardHeight(qcv,qc,i);
    else{qcv.preload='metadata';qcv.addEventListener('loadedmetadata',()=>setCardHeight(qcv,qc,i),{once:true})}
  }

  if(loading)return;
  loading=true;

  const back=getBackVideo();
  // 先显示当前活跃 video（确保不是两个都隐藏）
  if(!getActiveVideo().classList.contains('show')&&getActiveVideo().src){
    getActiveVideo().style.display='block';
  }
  back.src=src;
  back.oncanplay=()=>{
    back.oncanplay=null;
    // 切换
    getActiveVideo().style.display='none';
    getActiveVideo().pause();
    back.style.display='block';
    activeV=activeV==='a'?'b':'a';
    updateCtrlBindings();
    loading=false;
  };
  back.load();
  // 超时保护：1秒后强制切换
  setTimeout(()=>{if(back.oncanplay){back.oncanplay=null;getActiveVideo().style.display='none';getActiveVideo().pause();back.style.display='block';activeV=activeV==='a'?'b':'a';updateCtrlBindings();loading=false}},1000);
}

function updateCtrlBindings(){
  const oldA=document.getElementById('video-preview-a');
  const oldB=document.getElementById('video-preview-b');
  oldA.removeEventListener('timeupdate',onTimeUpdate);
  oldB.removeEventListener('timeupdate',onTimeUpdate);
  oldA.removeEventListener('ended',onEnded);
  oldB.removeEventListener('ended',onEnded);
  const v=getActiveVideo();
  v.addEventListener('timeupdate',onTimeUpdate);
  v.addEventListener('ended',onEnded);
}

function onTimeUpdate(){
  const v=getActiveVideo();
  if(v.duration){
    document.getElementById('preview-bar-fill').style.width=(v.currentTime/v.duration*100)+'%';
  }
}
function onEnded(){document.getElementById('preview-play-btn').textContent='▶'}

function togglePreviewPlay(){
  const v=getActiveVideo();
  if(v.paused){v.play();document.getElementById('preview-play-btn').textContent='⏸'}
  else{v.pause();document.getElementById('preview-play-btn').textContent='▶'}
}

function seekPreview(e){
  const bar=document.getElementById('preview-bar');
  const rect=bar.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  const v=getActiveVideo();
  if(v.duration)v.currentTime=pct*v.duration;
  document.getElementById('preview-bar-fill').style.width=pct*100+'%';
}

function updateQueueStatus(i){
  // 只更新第 i 个卡片的状态标签，不重建 DOM
  const card=document.getElementById('qc-'+i);
  if(!card)return;
  const oldBadge=card.querySelector('.qc-status');
  if(oldBadge)oldBadge.remove();
  const v=videoQueue[i];
  if(v.status==='done'||v.status==='fail'){
    const cls=v.status==='done'?'done':'fail';
    const badge=document.createElement('div');
    badge.className='qc-status '+cls;
    badge.textContent=v.status==='done'?'✓':'✗';
    card.appendChild(badge);
  }
}

function refreshCustSelect(){
  const dropdown=document.getElementById('account-select-dropdown');
  const sel=document.getElementById('account-select');
  const cur=sel.value;
  const options=Array.from(sel.options);
  dropdown.innerHTML=options.map(o=>`<div class="cust-option${o.value===cur?' selected':''}" onclick="selectCustOption('${esc(o.value)}')">${o.text}</div>`).join('');
  document.querySelector('.cust-text').textContent=options.find(o=>o.selected)?.text||'选择账号…';
}
function toggleCustSelect(){
  const trigger=document.getElementById('account-select-trigger');
  const dropdown=document.getElementById('account-select-dropdown');
  const open=dropdown.classList.toggle('show');
  trigger.classList.toggle('open',open);
}
function selectCustOption(val){
  document.getElementById('account-select').value=val;
  refreshCustSelect();
  document.getElementById('account-select-trigger').classList.remove('open');
  document.getElementById('account-select-dropdown').classList.remove('show');
}
document.addEventListener('click',e=>{
  const wrap=document.getElementById('account-select-wrap');
  if(wrap&&!wrap.contains(e.target)){
    document.getElementById('account-select-trigger').classList.remove('open');
    document.getElementById('account-select-dropdown').classList.remove('show');
  }
});

// ==================== 发表 ====================
async function startUpload(){
  const account=document.getElementById('account-select').value;
  const title=document.getElementById('form-title').value.trim();
  const desc=document.getElementById('form-desc').value.trim();
  const drama=document.getElementById('form-drama').value.trim();
  const sched=document.querySelector('input[name=schedule]:checked').value==='scheduled';
  const startTimeVal=sched?document.getElementById('form-time').value:'';
  const intervalMin=parseInt(document.getElementById('form-interval').value)||0;

  if(!account){toast('请选择账号');return}
  if(!videoQueue.length){toast('请添加视频');return}

  const overlay=document.getElementById('overlay');overlay.classList.add('show');
  document.getElementById('spinner').style.display='block';
  document.getElementById('log-text').textContent='';

  // 本地定时等待
  if(startTimeVal){
    const target=new Date(startTimeVal).getTime();
    const waitMs=target-Date.now();
    if(waitMs>0){
      document.getElementById('status-text').textContent='等待定时开始...';
      document.getElementById('progress-pct').textContent='';
      await new Promise(r=>setTimeout(r,waitMs));
    }
  }

  for(let i=0;i<videoQueue.length;i++){
    const v=videoQueue[i];
    document.getElementById('status-text').textContent=`上传中 (${i+1}/${videoQueue.length})`;
    document.getElementById('progress-text').textContent=v.name;

    const res=await fetch('/api/upload',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({account,video_path:v.path,title,description:desc,cover_path:currentCoverPath,short_drama_name:drama,publish_time:'',location:'none'})});
    const data=await res.json();
    if(data.error){v.status='fail';document.getElementById('log-text').textContent+=`\n[失败] ${v.name}`}
    else{
      let done=false,st=null,t0=Date.now();
      while(!done){await new Promise(r=>setTimeout(r,2000));let sr;try{sr=await fetch('/api/upload/status');st=await sr.json()}catch(e){continue}document.getElementById('status-text').textContent=st.status;let pct=st.progress||0;if(Date.now()-t0>1000&&pct<1)pct=1;document.getElementById('progress-fill').style.width=pct+'%';document.getElementById('progress-pct').textContent=Math.round(pct)+'%';if(st.status==='已取消'||st.cancelled)break;done=!st.running}
      if(st&&st.cancelled){document.getElementById('log-text').textContent+=`\n[取消] ${v.name}`;break}
	      v.status=st&&st.result&&st.result.status==='published'?'done':'fail';
      document.getElementById('log-text').textContent+=`\n[${v.status==='done'?'成功':'失败'}] ${v.name}`;
    }
    updateQueueStatus(i);
	    if(intervalMin>0&&i<videoQueue.length-1){document.getElementById('status-text').textContent=`等待间隔 ${intervalMin} 分钟...`;await new Promise(r=>setTimeout(r,intervalMin*60000))}
	  }
  document.getElementById('progress-fill').style.width='100%';
  document.getElementById('status-text').textContent='全部完成';
  document.getElementById('spinner').style.display='none';
  videoDz.classList.remove('has-file');
  videoDz.innerHTML='<div class="dz-icon">+</div><div class="dz-title">拖拽或点击选择视频</div><div class="dz-hint">MP4/H.264，不超过 20GB，支持多选</div>';
  setTimeout(()=>overlay.classList.remove('show'),3000);
}

function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}

// ==================== 暗色模式 ====================
(function initTheme(){
  const saved=localStorage.getItem('theme');
  const prefers=window.matchMedia('(prefers-color-scheme:dark)').matches;
  if(saved==='dark'||(!saved&&prefers))document.documentElement.setAttribute('data-theme','dark');
  updateThemeIcon();
})();
function toggleTheme(){
  const el=document.documentElement;
  if(el.hasAttribute('data-theme')){el.removeAttribute('data-theme');localStorage.setItem('theme','light')}
  else{el.setAttribute('data-theme','dark');localStorage.setItem('theme','dark')}
  updateThemeIcon();
}
function updateThemeIcon(){
  document.getElementById('theme-toggle').textContent=document.documentElement.hasAttribute('data-theme')?'☀️':'🌙';
}
