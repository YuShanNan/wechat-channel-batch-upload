<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频号上传</title>
<style>
  :root {
    --green: #07c160; --green-hover: #06ad50; --red: #e74c3c; --blue: #1677ff;
    --bg: #f0f2f5; --card: #fff; --text: #1a1a1a; --text2: #888;
    --border: #e5e5e5; --shadow: 0 1px 3px rgba(0,0,0,.06); --radius: 8px;
    --label: #555; --hover-bg: #f0faf4; --bar-track: #e9ecef;
    --overlay-bg: rgba(0,0,0,.3); --badge-done-bg: #d4edda; --badge-done-text: #155724;
    --badge-fail-bg: #f8d7da; --badge-fail-text: #721c24;
  }
  [data-theme="dark"] {
    --bg: #1a1a1c; --card: #2a2a2d; --text: #e0e0e0; --text2: #999; --blue: #4096ff;
    --border: #3a3a3d; --shadow: 0 1px 3px rgba(0,0,0,.4);
    --label: #aaa; --hover-bg: #1a3a1a; --bar-track: #3a3a3d;
    --overlay-bg: rgba(0,0,0,.6); --badge-done-bg: #1a3a1a; --badge-done-text: #7ddf90;
    --badge-fail-bg: #3a1a1a; --badge-fail-text: #df7d7d;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:15px;color-scheme:light dark}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-user-select:text;user-select:text}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:var(--bar-track)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--text2)}

  .main{max-width:1060px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 340px;gap:24px}
  .left,.right{display:flex;flex-direction:column;gap:16px}
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
  .card-title{font-size:13px;font-weight:500;color:var(--label);margin-bottom:8px}

  /* 拖拽区 */
  .dropzone{
    border:2px dashed var(--border);border-radius:var(--radius);
    padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  }
  .dropzone.dragover{border-color:var(--green);background:var(--hover-bg)}
  .dropzone.has-file{border-style:solid;border-color:var(--green)}
  .dropzone .dz-icon{font-size:32px;color:var(--text2)}
  .dropzone .dz-title{font-size:14px;font-weight:500}
  .dropzone .dz-hint{font-size:11px;color:var(--text2)}
  .dropzone .dz-file{font-size:12px;color:var(--green);word-break:break-all}
  .dropzone .dz-progress{height:4px;background:var(--bar-track);border-radius:2px;margin-top:8px;width:100%;overflow:hidden}
  .dropzone .dz-progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .2s}

  /* 封面 */
  .cover-drop{
    border:2px dashed var(--border);border-radius:var(--radius);
    padding:20px 16px;text-align:center;cursor:pointer;transition:all .2s;
    min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  }
  .cover-drop.dragover{border-color:var(--green);background:var(--hover-bg)}
  .cover-drop.has-file{border-style:solid;border-color:var(--green)}
  .cover-drop .cv-label{font-size:12px;color:var(--text2)}
  .cover-drop .cv-ratio{font-size:11px;color:var(--text2)}
  .cover-drop .cv-file{font-size:11px;color:var(--green);word-break:break-all}
  .cover-drop img.cover-thumb{max-width:100%;height:auto;border-radius:6px}

  /* 预览 */
  .preview-wrap{display:none;position:relative;width:100%;height:300px;border-radius:6px;overflow:hidden;background:#000;cursor:pointer}
  .preview-wrap.show{display:block}
  .video-preview{display:block;width:100%;height:calc(100% - 32px);object-fit:contain}
  .preview-ctrls{display:flex;align-items:center;gap:8px;padding:4px 10px;height:32px;background:rgba(0,0,0,.7)}
  .preview-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:14px;padding:2px 6px;line-height:1;font-family:inherit}
  .preview-btn:hover{color:var(--green)}
  .preview-bar{flex:1;height:12px;cursor:pointer;position:relative;display:flex;align-items:center}
  .preview-bar-track{width:100%;height:4px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden}
  .preview-bar-fill{height:4px;background:var(--green);border-radius:2px;transition:width .1s linear}

  /* 横向队列卡片 */
  .queue-row{display:flex;flex-wrap:wrap;gap:10px}
  .queue-row>[id^="qw-"]{transition:transform .25s ease}
  .queue-card{
    border-radius:6px;overflow:hidden;cursor:pointer;position:relative;
    border:2px solid transparent;transition:border-color .15s,height .3s ease,transform .25s ease;
    flex-shrink:0;
  }
  .queue-card:hover{border-color:var(--border)}
  .queue-card.active{border-color:var(--green)}
  .queue-card.dragging{opacity:.4}
  .queue-card .qc-thumb{width:100%;height:100%;object-fit:cover;display:block;background:#000}
  .queue-card .qc-remove{
    position:absolute;top:2px;right:2px;
    width:18px;height:18px;border-radius:50%;
    background:rgba(0,0,0,.55);color:#fff;
    font-size:11px;line-height:18px;text-align:center;
    cursor:pointer;display:none;
  }
  .queue-card:hover .qc-remove{display:block}
  .queue-card .qc-remove:hover{background:var(--red)}
  .queue-card .qc-status{
    position:absolute;top:2px;left:2px;
    padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600;
  }
  .queue-card .qc-status.done{background:var(--badge-done-bg);color:var(--badge-done-text)}
  .queue-card .qc-status.fail{background:var(--badge-fail-bg);color:var(--badge-fail-text)}
  .qc-name{
    font-size:11px;color:var(--text2);text-align:center;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    max-width:140px;margin-top:4px;
  }

  /* 表单 */
  .form-group{display:flex;flex-direction:column;gap:4px}
  .form-group label{font-size:13px;font-weight:500;color:var(--label)}
  .form-group input:not([type=radio]):not([type=checkbox]),.form-group textarea{
    padding:10px 12px;border:1px solid var(--border);border-radius:6px;
    font-size:14px;font-family:inherit;outline:none;width:100%;transition:border-color .2s;
    background:var(--card);color:var(--text);
  }
  .form-group textarea{min-height:80px;resize:vertical}
  .form-group input:focus,.form-group textarea:focus{border-color:var(--green)}

  .radio-row{display:flex;gap:16px;padding:8px 0;align-items:center}
  .radio-row label{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px}
  .radio-row input[type=radio]{accent-color:var(--green)}

  .btn{padding:10px 24px;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-publish{background:var(--green);color:#fff;width:100%}
  .btn-publish:hover:not(:disabled){background:var(--green-hover)}

  .toast{position:fixed;top:20px;right:20px;background:#333;color:#fff;padding:10px 20px;border-radius:6px;font-size:13px;z-index:999;animation:slideIn .3s ease}
  @keyframes slideIn{from{transform:translateX(100px);opacity:0}}

  /* 账号管理 */
  .btn-sm{padding:6px 12px;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
  .btn-mgmt{background:var(--border);color:var(--label);white-space:nowrap}
  .btn-mgmt:hover{background:var(--border)}
  .acct-overlay{display:none;position:fixed;inset:0;background:var(--overlay-bg);z-index:101;align-items:center;justify-content:center}
  .acct-overlay.show{display:flex}
  .acct-overlay .modal{background:var(--card);border-radius:12px;padding:28px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto}
  .acct-overlay .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .acct-overlay .modal-header h2{font-size:17px;font-weight:600}
  .acct-overlay .modal-close{background:none;border:none;font-size:20px;color:var(--text2);cursor:pointer;padding:0;line-height:1}
  .acct-overlay .modal-close:hover{color:var(--text)}
  .acct-add-form{display:flex;gap:8px;margin-bottom:16px;padding:0 24px}
  .acct-add-form input{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;outline:none;flex:1;min-width:0}
  .acct-add-form input:focus{border-color:var(--green)}
  .acct-table{width:100%;border-collapse:collapse;font-size:13px}
  .acct-table th,.acct-table td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
  .acct-table th{font-weight:500;color:var(--text2);font-size:11px}
  .acct-table td{color:var(--text)}
  .acct-table .acct-actions{display:flex;gap:6px}
  .acct-empty{padding:24px;text-align:center;color:var(--text2);font-size:13px}

  .debug-toggle{position:fixed;left:216px;bottom:8px;font-size:10px;color:var(--text2);cursor:pointer;user-select:none;z-index:200;transition:color .2s}
  .debug-toggle:hover{color:var(--label)}
  .debug-toggle.active{color:var(--green)}

  /* 二维码弹窗 */
  .qrcode-overlay{display:none;position:fixed;inset:0;background:var(--overlay-bg);z-index:102;align-items:center;justify-content:center}
  .qrcode-overlay.show{display:flex}
  .qrcode-modal{background:var(--card);border-radius:12px;padding:32px;text-align:center;max-width:360px;width:90%;position:relative}
  #qrcode-img{width:220px;height:220px;border:1px solid var(--border);border-radius:8px;object-fit:contain}
  .qrcode-status{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;font-size:14px;color:var(--label)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .qrcode-spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
  .qrcode-close{position:absolute;top:12px;right:12px;background:none;border:none;font-size:20px;color:var(--text2);cursor:pointer;line-height:1}
  .qrcode-close:hover{color:var(--text)}

  /* close-confirm dialog */
  .close-overlay{display:none;position:fixed;inset:0;background:var(--overlay-bg);z-index:200;align-items:center;justify-content:center}
  .close-overlay.show{display:flex}
  .close-modal{background:var(--card);border-radius:12px;padding:24px;text-align:center;max-width:300px;width:90%}
  .close-modal p{font-size:14px;color:var(--text);margin:0 0 16px}
  .close-modal .btn-row{display:flex;gap:8px}
  .close-modal .btn-row button{flex:1;padding:8px;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
  .close-modal .btn-tray{background:var(--green);color:#fff}
  .close-modal .btn-exit{background:var(--border);color:var(--label)}
  .close-modal .btn-cancel{background:transparent;color:var(--text2)}

  /* 表单统一 */
  input[type="datetime-local"],input[type="number"]{padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;outline:none;width:100%;transition:border-color .2s;background:var(--card);color:var(--text)}
  input[type="datetime-local"]:focus,input[type="number"]:focus{border-color:var(--green)}
  input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input[type="number"]{-moz-appearance:textfield}
  /* 按钮变体 */
  .btn-danger{background:var(--red);color:#fff}
  .btn-danger:hover{background:#c0392b}
  .btn-full{width:100%}

  .theme-toggle{position:fixed;top:12px;right:12px;background:none;border:1px solid var(--border);border-radius:6px;font-size:14px;padding:4px 8px;cursor:pointer;color:var(--text);z-index:200;font-family:inherit;transition:all .15s}
  .theme-toggle:hover{background:var(--hover-bg)}

  .app-layout{display:flex;height:100vh;overflow:hidden}
  .sidebar{width:200px;min-width:200px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
  .sidebar-header{padding:12px 14px;font-size:13px;font-weight:600;color:var(--text);border-bottom:1px solid var(--border)}
  .acct-item{padding:10px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;font-size:13px;display:flex;flex-direction:column;gap:2px}
  .acct-item:hover{background:var(--hover-bg)}
  .acct-item.active{border-left-color:var(--green);background:var(--hover-bg)}
  .acct-item .acct-nick{font-weight:500;color:var(--text)}
  .acct-item .acct-stat{font-size:11px;color:var(--text2)}
  .acct-item .acct-stat.running{color:var(--green)}
  .acct-item .acct-stat.error{color:var(--red)}
  .sidebar-footer{padding:10px 14px;border-top:1px solid var(--border);margin-top:auto}
  .btn-sidebar{width:100%;padding:8px;border:1px dashed var(--border);border-radius:6px;background:none;color:var(--text2);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s}
  .btn-sidebar:hover{border-color:var(--green);color:var(--green)}
  .main-area{flex:1;overflow-y:auto;padding:20px;background:var(--bg);position:relative}
  .main-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text2);font-size:14px}


  @media(max-width:800px){.app-layout{flex-direction:column}.sidebar{width:100%;min-width:0;max-height:120px;flex-shrink:0}}
</style>
</head>
<body>

<button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="切换暗色模式">🌙</button>

<div class="app-layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">账号列表</div>
    <div id="sidebar-accounts"></div>
    <div class="sidebar-footer">
      <button class="btn-sidebar" onclick="addAccount()">+ 添加账号</button>
      <button class="btn-sidebar" style="margin-top:4px" onclick="openAccountManager()">管理账号</button>
    </div>
  </div>
  <div class="main-area" id="main-area">
    <div class="main-empty" id="main-empty">← 选择或添加一个账号开始</div>
    <div id="main-content" style="display:none">
    </div>
    <div class="debug-toggle" id="debug-toggle" onclick="toggleDebug()" title="切换有头/无头浏览器">debug</div>
    <span class="debug-toggle" id="sound-toggle" onclick="toggleSound()" title="关闭提示音" style="left:270px">提示音</span>
  </div>
</div>

  <div class="acct-overlay" id="acct-overlay" onclick="closeAccountManager()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2>账号管理</h2>
      <button class="modal-close" onclick="closeAccountManager()">✕</button>
    </div>
    <div class="acct-add-form">
      <button class="btn-sm" style="flex:7;background:var(--green);color:#fff;padding:10px;font-size:14px" onclick="addAccount()">添加账号</button>
      <button class="btn-sm" id="check-btn" style="flex:1.5;background:var(--blue);color:#fff;padding:10px;font-size:14px;transition:all .15s" onclick="checkAccounts()">检测</button>
    </div>
    <table class="acct-table">
      <thead><tr><th>昵称</th><th>最后登录</th><th>操作</th></tr></thead>
      <tbody id="acct-tbody"></tbody>
    </table>
    <div class="acct-empty" id="acct-empty" style="display:none">暂无账号，请添加</div>
  </div>
</div>

<div class="close-overlay" id="close-overlay">
  <div class="close-modal">
    <p>关闭窗口后你想做什么？</p>
    <div class="btn-row">
      <button class="btn-tray" onclick="closeToTray()">退到后台</button>
      <button class="btn-exit" onclick="closeAndExit()">退出程序</button>
    </div>
    <button class="btn-cancel" style="margin-top:8px;width:100%" onclick="cancelClose()">取消</button>
  </div>
</div>

<div class="qrcode-overlay" id="qrcode-overlay">
  <div class="qrcode-modal">
    <button class="qrcode-close" onclick="cancelScan()">✕</button>
    <img id="qrcode-img" src="" alt="微信扫码登录" style="display:none">
    <div class="qrcode-status">
      <div class="qrcode-spinner" id="qrcode-spinner"></div>
      <span id="qrcode-status-text">正在获取二维码...</span>
    </div>
    <button class="btn btn-danger btn-full" style="margin-top:16px" onclick="cancelScan()">取消</button>
  </div>
</div>


<script>
// ==================== 关闭确认 ====================
window.addEventListener('beforeunload', (e) => {
  e.preventDefault();
  document.getElementById('close-overlay').classList.add('show');
  window._closePrevented = true;
});
let _closePrevented = false;
function closeToTray() {
  _closePrevented = false;
  document.getElementById('close-overlay').classList.remove('show');
  fetch('/api/window/minimize', { method: 'POST' });
}
function closeAndExit() {
  _closePrevented = false;
  const hasRunning = Object.values(accountStates).some(s => s.running);
  if (hasRunning && !confirm('有上传任务正在进行中，确定要退出吗？')) return;
  document.getElementById('close-overlay').classList.remove('show');
  fetch('/api/window/exit', { method: 'POST' });
}
function cancelClose() {
  document.getElementById('close-overlay').classList.remove('show');
}
document.addEventListener('contextmenu', e => e.preventDefault());

// ==================== 状态模型 ====================
let accounts = [];
let currentAccount = null;
let accountStates = {};  // { accountName: { videoQueue, coverPath, form, ... } }
let activeV = 'a', loading = false;
let _statusPollTimer = null, _allPollTimer = null;

function initAccountState(name) {
  if (!accountStates[name]) {
    accountStates[name] = {
      videoQueue: [],
      coverPath: '',
      form: { title: '', desc: '', drama: '', schedule: 'now', time: '', interval: 0 },
      status: 'idle',
      progress: 0,
      logs: [],
      running: false
    };
  }
  return accountStates[name];
}

// ==================== 账号加载与侧边栏 ====================
async function loadAccounts() {
  try {
    const res = await fetch('/api/accounts');
    const data = await res.json();
    accounts = data.accounts || [];
    _lastSidebarHTML = '';  // 强制刷新，避免缓存导致不更新
    renderSidebar();
    refreshAccountTable();
  } catch (e) {
    console.error('loadAccounts 失败:', e);
  }
}
loadAccounts().then(() => {
  // 启动后自动静默检测已登录账号有效性
  if (accounts.some(a => a.last_login)) silentCheckAccounts();
});

// === 静默检测（启动时自动运行，无 toast）===
let _silentCheckRunning = false;
async function silentCheckAccounts() {
  if (_silentCheckRunning) return;
  _silentCheckRunning = true;
  try {
    const res = await fetch('/api/accounts/check', { method: 'POST' });
    if (res.status !== 202) { _silentCheckRunning = false; return; }
    function poll() {
      _checkPollTimer = setTimeout(async () => {
        try {
          const sr = await fetch('/api/accounts/check/status');
          const st = await sr.json();
          refreshAccountTable(st.results);
          if (st.done) {
            await loadAccounts();
            renderSidebar();
            _silentCheckRunning = false;
            return;
          }
          poll();
        } catch (e) { poll(); }
      }, 2000);
    }
    poll();
  } catch (e) { _silentCheckRunning = false; }
}

let _lastSidebarHTML = '';
function renderSidebar() {
  const container = document.getElementById('sidebar-accounts');
  if (!accounts.length) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2);font-size:12px">暂无账号</div>';
    return;
  }
  const html = accounts.map(a => {
    const st = accountStates[a.name] || { status: 'idle', progress: 0, running: false };
    const active = currentAccount === a.name ? ' active' : '';
    const statCls = st.running ? 'running' : (st.status.startsWith('失败') || st.status.startsWith('异常') ? 'error' : '');
    const statText = !a.last_login ? '未登录'
      : st.running ? st.status + ' ' + st.progress + '%'
      : (st.status === '全部完成' ? '已完成' : (st.status === 'idle' ? '空闲' : st.status));
    return `<div class="acct-item${active}" onclick="switchAccount('${esc(a.name)}')">
      <div class="acct-nick">${esc(a.nickname || a.name)}</div>
      <div class="acct-stat ${statCls}">${esc(statText)}</div>
    </div>`;
  }).join('');
  if (html === _lastSidebarHTML) return;
  _lastSidebarHTML = html;
  container.innerHTML = html;
}

function switchAccount(name) {
  saveCurrentForm();
  currentAccount = name;
  _lastQueueLen = -1;
  _lastSidebarHTML = '';
  initAccountState(name);
  renderSidebar();
  renderMainContent();
  if (accountStates[name].running) {
    startStatusPolling(name);
  }
}

function saveCurrentForm() {
  if (!currentAccount) return;
  const st = accountStates[currentAccount];
  const titleEl = document.getElementById('form-title');
  const descEl = document.getElementById('form-desc');
  const dramaEl = document.getElementById('form-drama');
  const schedEl = document.querySelector('input[name=schedule]:checked');
  const timeEl = document.getElementById('form-time');
  const intvEl = document.getElementById('form-interval');
  if (!titleEl) return;  // elements not rendered yet
  st.form = {
    title: titleEl.value || st.form.title,
    desc: descEl ? descEl.value : st.form.desc,
    drama: dramaEl ? dramaEl.value : st.form.drama,
    schedule: schedEl ? schedEl.value : 'now',

  };
}

function getFileName(path) {
  const parts = path.replace(/\\/g, '/').split('/');
  return parts[parts.length - 1];
}

// ==================== 拖拽区事件绑定 ====================
function bindDropzoneEvents() {
  const dz = document.getElementById('video-dz');
  const input = document.getElementById('video-input');
  if (!dz || !input) return;

  // Remove old listeners by cloning
  const newDz = dz.cloneNode(true);
  dz.parentNode.replaceChild(newDz, dz);
  const newInput = input.cloneNode(true);
  input.parentNode.replaceChild(newInput, input);

  newDz.addEventListener('click', () => newInput.click());
  newDz.addEventListener('dragover', e => { e.preventDefault(); newDz.classList.add('dragover'); });
  newDz.addEventListener('dragleave', () => newDz.classList.remove('dragover'));
  newDz.addEventListener('drop', async e => {
    e.preventDefault(); newDz.classList.remove('dragover');
    await uploadFiles(e.dataTransfer.files, 'video');
  });
  newInput.addEventListener('change', async () => {
    await uploadFiles(newInput.files, 'video'); newInput.value = '';
  });
}

function bindCoverEvents() {
  const dz = document.getElementById('cover-dz');
  const input = document.getElementById('cover-input');
  if (!dz || !input) return;

  const newDz = dz.cloneNode(true);
  dz.parentNode.replaceChild(newDz, dz);
  const newInput = input.cloneNode(true);
  input.parentNode.replaceChild(newInput, input);

  newDz.addEventListener('click', () => newInput.click());
  newDz.addEventListener('dragover', e => { e.preventDefault(); newDz.classList.add('dragover'); });
  newDz.addEventListener('dragleave', () => newDz.classList.remove('dragover'));
  newDz.addEventListener('drop', async e => {
    e.preventDefault(); newDz.classList.remove('dragover');
    await uploadFiles(e.dataTransfer.files, 'cover');
  });
  newInput.addEventListener('change', async () => {
    await uploadFiles(newInput.files, 'cover'); newInput.value = '';
  });
}

// ==================== 文件上传 ====================
async function uploadFiles(files, type) {
  if (!currentAccount) { toast('请先选择账号'); return; }
  const st = accountStates[currentAccount];
  const newVideos = [];
  const dz = document.getElementById('video-dz');

  for (const f of files) {
    if (type === 'video' && !f.type.startsWith('video/')) continue;
    if (type === 'cover' && !f.type.startsWith('image/')) continue;

    if (type === 'video' && dz) {
      dz.innerHTML = '<div class="dz-file">上传中: ' + f.name + '</div><div class="dz-progress"><div class="dz-progress-fill" id="dz-pct" style="width:0%"></div></div>';
      dz.classList.add('has-file');
    }

    const form = new FormData(); form.append('file', f);
    let res;
    try {
      res = await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.upload.onprogress = e => {
          if (e.lengthComputable) {
            const pct = Math.round(e.loaded / e.total * 100);
            const el = document.getElementById('dz-pct');
            if (el) el.style.width = pct + '%';
          }
        };
        xhr.onload = () => { try { resolve(JSON.parse(xhr.responseText)); } catch (e) { reject(e); } };
        xhr.onerror = () => reject(new Error('上传失败'));
        xhr.open('POST', '/api/upload-temp'); xhr.send(form);
      });
    } catch (e) { toast('上传失败: ' + e.message); continue; }

    if (res.error) { toast(res.error); continue; }
    if (res.path) {
      if (type === 'video') {
        newVideos.push({ path: res.path, name: res.name, status: '', cardHeight: null });
      } else {
        st.coverPath = res.path;
        setCoverDataForAccount(res.path, res.name);
      }
    }
  }
  if (newVideos.length > 0) {
    st.videoQueue.push(...newVideos);
  }
  if (dz) {
    dz.classList.remove('has-file');
    dz.innerHTML = '<div class="dz-icon">+</div><div class="dz-title">拖拽或点击选择视频</div><div class="dz-hint">MP4/H.264，不超过 20GB，支持多选</div>';
  }
  renderQueueForAccount();
}

function setCoverDataForAccount(path, name) {
  const dz = document.getElementById('cover-dz');
  if (!dz) return;
  dz.innerHTML = '<div class="cv-file">' + name + '</div><img class="cover-thumb" src="/api/preview/' + encodeURIComponent(path) + '">';
  dz.classList.add('has-file');
}

// ==================== 队列渲染（per-account） ====================
let _lastQueueLen = -1;
let _lastQueueAccount = '';
function renderQueueForAccount() {
  const st = accountStates[currentAccount];
  const queue = st.videoQueue;
  const row = document.getElementById('queue-row');
  const countEl = document.getElementById('queue-count');
  const previewCard = document.getElementById('preview-card');
  if (!row) return;

  countEl.textContent = queue.length;
  if (queue.length === 0) {
    row.innerHTML = '';
    _lastQueueLen = 0;
    _lastQueueAccount = currentAccount;
    if (previewCard) previewCard.style.display = 'none';
    return;
  }
  if (previewCard) previewCard.style.display = '';

  if (queue.length !== _lastQueueLen || currentAccount !== _lastQueueAccount) {
    _lastQueueLen = queue.length;
    _lastQueueAccount = currentAccount;

    const W = 140;
    row.innerHTML = queue.map((v, i) => {
      const cls = v.status === 'done' ? 'done' : v.status === 'fail' ? 'fail' : '';
      const src = v.path ? '/api/preview/' + encodeURIComponent(v.path) : '';
      const h = v.cardHeight || 78;
      return '<div id="qw-' + i + '" style="display:flex;flex-direction:column;align-items:center;gap:2px" onclick="updatePreview(' + i + ')" draggable="true" onDragStart="onDragStart(event,' + i + ')" onDragOver="onDragOver(event)" onDrop="onDrop(event,' + i + ')" onDragEnd="onDragEnd(event)">'
        + '<div class="queue-card' + (i === 0 ? ' active' : '') + '" id="qc-' + i + '" style="width:' + W + 'px;height:' + h + 'px">'
        + (src ? '<video class="qc-thumb" id="qcv-' + i + '" src="' + src + '" preload="auto" muted playsinline onloadedmetadata="setCardHeight(this,document.getElementById(\'qc-' + i + '\'),' + i + ')" onloadeddata="captureThumb(this,' + i + ')"></video>' : '<div class="qc-thumb" id="qcv-' + i + '" style="display:flex;align-items:center;justify-content:center;color:#666;font-size:11px">...</div>')
        + (cls ? '<div class="qc-status ' + cls + '">' + (cls === 'done' ? '✓' : '✗') + '</div>' : '')
        + '<div class="qc-remove" onclick="event.stopPropagation();removeFromQueue(' + i + ')">✕</div>'
        + '</div><div class="qc-name" title="' + v.name + '">' + v.name + '</div></div>';
    }).join('');

    queue.forEach((v, i) => {
      if (v.cardHeight) {
        const card = document.getElementById('qc-' + i);
        if (card) card.style.height = v.cardHeight + 'px';
      }
    });
    if (queue.length > 0 && document.getElementById('preview-wrap') && !document.getElementById('preview-wrap').classList.contains('show')) updatePreview(0);
  } else {
    queue.forEach((v, i) => {
      const card = document.getElementById('qc-' + i);
      if (!card) return;
      const cls = v.status === 'done' ? 'done' : v.status === 'fail' ? 'fail' : '';
      let badge = card.querySelector('.qc-status');
      if (cls) {
        if (!badge) {
          badge = document.createElement('div');
          badge.className = 'qc-status';
          card.appendChild(badge);
        }
        badge.className = 'qc-status ' + cls;
        badge.textContent = cls === 'done' ? '✓' : '✗';
      } else if (badge) {
        badge.remove();
      }
    });
  }
}

function setCardHeight(vel, card, i) {
  const st = accountStates[currentAccount];
  const W = 140, vw = vel.videoWidth, vh = vel.videoHeight;
  if (vw && vh) {
    const h = Math.round(W * vh / vw);
    card.style.height = h + 'px';
    st.videoQueue[i].cardHeight = h;
  }
}

function captureThumb(vel, i) {
  const st = accountStates[currentAccount];
  if (!st || st.videoQueue[i]._thumbed) return;
  st.videoQueue[i]._thumbed = true;
  try {
    const cvs = document.createElement('canvas');
    cvs.width = vel.videoWidth;
    cvs.height = vel.videoHeight;
    const ctx = cvs.getContext('2d');
    ctx.drawImage(vel, 0, 0);
    vel.setAttribute('poster', cvs.toDataURL('image/jpeg', 0.7));
    vel.style.objectFit = 'cover';
  } catch(e) {}
}

function removeFromQueue(i) {
  accountStates[currentAccount].videoQueue.splice(i, 1);
  renderQueueForAccount();
}

function clearQueue() {
  if (!currentAccount) return;
  const st = accountStates[currentAccount];
  if (!st.videoQueue.length) return;
  if (!confirm('确定清空全部 ' + st.videoQueue.length + ' 个视频？')) return;
  st.videoQueue = [];
  renderQueueForAccount();
}

// ==================== 拖拽排序 ====================
let dragIdx = null;
function onDragStart(e, i) {
  dragIdx = i;
  document.getElementById('qc-' + i).classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function onDrop(e, i) {
  e.preventDefault();
  if (dragIdx === null || dragIdx === i) return;
  const row = document.getElementById('queue-row');
  const srcEl = document.getElementById('qw-' + dragIdx);
  const tgtEl = document.getElementById('qw-' + i);
  if (!srcEl || !tgtEl) return;
  const wrappers = [...row.querySelectorAll('[id^="qw-"]')];
  const oldRects = wrappers.map(el => el.getBoundingClientRect());
  if (dragIdx < i) { tgtEl.after(srcEl); } else { tgtEl.before(srcEl); }
  const st = accountStates[currentAccount];
  const [item] = st.videoQueue.splice(dragIdx, 1);
  st.videoQueue.splice(i, 0, item);
  const newWrappers = [...row.querySelectorAll('[id^="qw-"]')];
  newWrappers.forEach((w, idx) => {
    w.id = 'qw-' + idx;
    w.setAttribute('ondragstart', 'onDragStart(event,' + idx + ')');
    w.setAttribute('ondrop', 'onDrop(event,' + idx + ')');
    w.setAttribute('onclick', 'updatePreview(' + idx + ')');
    w.querySelector('.queue-card').id = 'qc-' + idx;
    const qcRemove = w.querySelector('.qc-remove');
    if (qcRemove) qcRemove.setAttribute('onclick', 'event.stopPropagation();removeFromQueue(' + idx + ')');
    const thumb = w.querySelector('.qc-thumb');
    if (thumb) thumb.id = 'qcv-' + idx;
  });
  document.getElementById('queue-count').textContent = st.videoQueue.length;
  requestAnimationFrame(() => {
    [...row.querySelectorAll('[id^="qw-"]')].forEach((w, j) => {
      if (j >= oldRects.length) return;
      const nr = w.getBoundingClientRect();
      const dx = oldRects[j].left - nr.left;
      const dy = oldRects[j].top - nr.top;
      if (dx || dy) { w.style.transition = 'none'; w.style.transform = 'translate(' + dx + 'px,' + dy + 'px)'; w.offsetHeight; w.style.transition = ''; w.style.transform = ''; }
    });
  });
}
function onDragEnd(e) {
  if (dragIdx !== null) { document.getElementById('qc-' + dragIdx)?.classList.remove('dragging'); }
  dragIdx = null;
}

// ==================== 视频预览 ====================
function getActiveVideo() { return document.getElementById('video-preview-' + activeV); }
function getBackVideo() { return document.getElementById('video-preview-' + (activeV === 'a' ? 'b' : 'a')); }

function updatePreview(i) {
  const st = accountStates[currentAccount];
  const wrap = document.getElementById('preview-wrap');
  if (i === null || !st || i >= st.videoQueue.length) { if (wrap) wrap.classList.remove('show'); return; }
  const src = st.videoQueue[i].path ? '/api/preview/' + encodeURIComponent(st.videoQueue[i].path) : '';
  if (!src) return;
  wrap.classList.add('show');
  document.querySelectorAll('.queue-card').forEach((el, j) => el.classList.toggle('active', j === i));
  document.getElementById('preview-play-btn').textContent = '▶';
  document.getElementById('preview-bar-fill').style.width = '0%';
  const qcv = document.getElementById('qcv-' + i);
  const qc = document.getElementById('qc-' + i);
  if (qcv && qc && !st.videoQueue[i].cardHeight) {
    if (qcv.readyState >= 1) setCardHeight(qcv, qc, i);
    else { qcv.addEventListener('loadedmetadata', () => setCardHeight(qcv, qc, i), { once: true }); }
  }
  if (loading) return;
  loading = true;
  const back = getBackVideo();
  if (!getActiveVideo().classList.contains('show') && getActiveVideo().src) { getActiveVideo().style.display = 'block'; }
  back.src = src;
  back.oncanplay = () => {
    back.oncanplay = null;
    getActiveVideo().style.display = 'none';
    getActiveVideo().pause();
    back.style.display = 'block';
    activeV = activeV === 'a' ? 'b' : 'a';
    updateCtrlBindings();
    loading = false;
  };
  back.load();
  setTimeout(() => { if (back.oncanplay) { back.oncanplay = null; getActiveVideo().style.display = 'none'; getActiveVideo().pause(); back.style.display = 'block'; activeV = activeV === 'a' ? 'b' : 'a'; updateCtrlBindings(); loading = false; } }, 1000);
}

function updateCtrlBindings() {
  const oldA = document.getElementById('video-preview-a');
  const oldB = document.getElementById('video-preview-b');
  if (oldA) { oldA.removeEventListener('timeupdate', onTimeUpdate); oldA.removeEventListener('ended', onEnded); }
  if (oldB) { oldB.removeEventListener('timeupdate', onTimeUpdate); oldB.removeEventListener('ended', onEnded); }
  const v = getActiveVideo();
  if (v) { v.addEventListener('timeupdate', onTimeUpdate); v.addEventListener('ended', onEnded); }
}
function onTimeUpdate() {
  const v = getActiveVideo();
  if (v && v.duration) { document.getElementById('preview-bar-fill').style.width = (v.currentTime / v.duration * 100) + '%'; }
}
function onEnded() { document.getElementById('preview-play-btn').textContent = '▶'; }
function togglePreviewPlay() {
  const v = getActiveVideo();
  if (!v) return;
  if (v.paused) { v.play(); document.getElementById('preview-play-btn').textContent = '⏸'; }
  else { v.pause(); document.getElementById('preview-play-btn').textContent = '▶'; }
}
function seekPreview(e) {
  const bar = document.getElementById('preview-bar');
  const rect = bar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const v = getActiveVideo();
  if (v && v.duration) v.currentTime = pct * v.duration;
  document.getElementById('preview-bar-fill').style.width = pct * 100 + '%';
}

// ==================== 发表与上传状态 ====================
async function startUpload() {
  if (!currentAccount) { toast('请先选择账号'); return; }
  const st = accountStates[currentAccount];
  if (!st.videoQueue.length) { toast('请添加视频'); return; }

  saveCurrentForm();
  const f = st.form;

  const payload = {
    videos: st.videoQueue.map(v => ({
      video_path: v.path,
      title: f.title,
      description: f.desc,
      short_drama_name: f.drama,
      publish_time: f.schedule === 'scheduled' ? (f.time || '') : '',
      cover_path: st.coverPath,
      location: 'none',
    })),
    interval_min: f.interval,
  };

  const res = await fetch('/api/accounts/' + encodeURIComponent(currentAccount) + '/upload/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (data.error) { toast(data.error); return; }

  st.running = true;
  st.status = '等待中...';
  st.progress = 0;
  st.logs = [];

  showUploadBar(true);
  renderSidebar();
  startStatusPolling(currentAccount);
}

function startStatusPolling(accountName) {
  if (_statusPollTimer) clearTimeout(_statusPollTimer);
  _pollStatus(accountName);
}

async function _pollStatus(accountName) {
  try {
    const res = await fetch('/api/accounts/' + encodeURIComponent(accountName) + '/upload/status');
    const st = await res.json();
    const local = accountStates[accountName];
    if (!local) return;

    const prevState = local.running + '|' + local.status + '|' + local.progress;

    local.status = st.status || '';
    local.progress = st.progress || 0;
    local.logs = st.logs || [];
    local.running = st.running;

    if (currentAccount === accountName) {
      updateUploadBar(local);
    }

    // Update queue item statuses
    if (st.queue) {
      st.queue.forEach((qs, i) => {
        if (local.videoQueue[i]) {
          local.videoQueue[i].status = qs.status === 'published' ? 'done' : (qs.status === 'failed' ? 'fail' : '');
        }
      });
      if (currentAccount === accountName) renderQueueForAccount();
    }

    if (!st.running) {
      local.running = false;
      local.status = st.status;
      if (currentAccount === accountName) showUploadBar(false);
      _statusPollTimer = null;
    } else {
      _statusPollTimer = setTimeout(() => _pollStatus(accountName), 1000);
    }

    const newState = local.running + '|' + local.status + '|' + local.progress;
    if (prevState !== newState) renderSidebar();
  } catch (e) {
    _statusPollTimer = setTimeout(() => _pollStatus(accountName), 3000);
  }
}

function updateUploadBar(st) {
  document.getElementById('upload-status-text').textContent = st.status || '';
  document.getElementById('upload-status-pct').textContent = Math.round(st.progress || 0) + '%';
  document.getElementById('upload-status-fill').style.width = (st.progress || 0) + '%';
  document.getElementById('upload-status-logs').textContent = (st.logs || []).slice(-8).join('\n');
}

function showUploadBar(show) {
  document.getElementById('upload-status-bar').style.display = show ? '' : 'none';
  document.getElementById('btn-publish').style.display = show ? 'none' : '';
  document.getElementById('btn-cancel-upload').style.display = show ? '' : 'none';
  document.getElementById('btn-skip-current').style.display = show ? '' : 'none';
}

async function cancelUpload() {
  if (!currentAccount) return;
  await fetch('/api/accounts/' + encodeURIComponent(currentAccount) + '/upload/cancel', { method: 'POST' });
  accountStates[currentAccount].running = false;
  accountStates[currentAccount].status = '已取消';
  showUploadBar(false);
  renderSidebar();
  toast('已取消');
}

async function skipCurrentVideo() {
  if (!currentAccount) return;
  const res = await fetch('/api/accounts/' + encodeURIComponent(currentAccount) + '/upload/skip', { method: 'POST' });
  const data = await res.json();
  if (data.message) toast(data.message);
}

// ==================== 全局账号状态轮询 ====================
function startAllAccountsPolling() {
  if (_allPollTimer) return;
  _pollAllAccounts();
}

async function _pollAllAccounts() {
  try {
    const res = await fetch('/api/upload/status/all');
    const data = await res.json();
    for (const [name, st] of Object.entries(data)) {
      if (!accountStates[name]) initAccountState(name);
      accountStates[name].running = st.running;
      accountStates[name].status = st.status || accountStates[name].status;
      accountStates[name].progress = st.progress || 0;
    }
    renderSidebar();
  } catch (e) { /* ignore */ }

  // 检测 QR 登录弹窗（上传时自动弹出）
  try {
    const qrRes = await fetch('/api/qr-login/status');
    const qrSt = await qrRes.json();
    if (qrSt.active && !document.getElementById('qrcode-overlay').classList.contains('show')) {
      openQrcodeModal();
      pollQrcodeStatus();
    }
  } catch (e) { /* ignore */ }

  _allPollTimer = setTimeout(_pollAllAccounts, 3000);
}
startAllAccountsPolling();

// ==================== 定时 ====================
function toggleSchedule() {
  const el = document.getElementById('form-time');
  const radio = document.querySelector('input[name=schedule]:checked');
  if (el && radio) el.style.display = radio.value === 'scheduled' ? 'block' : 'none';
}

// ==================== 账号管理模态框 ====================
function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }

function refreshAccountTable(results) {
  const tbody = document.getElementById('acct-tbody');
  const empty = document.getElementById('acct-empty');
  if (!tbody) return;
  if (!accounts.length) { tbody.innerHTML = ''; if (empty) empty.style.display = ''; return; }
  if (empty) empty.style.display = 'none';
  tbody.innerHTML = accounts.map(a => {
    let loginCell = esc(a.last_login || '未登录');
    if (results && results.hasOwnProperty(a.name)) {
      const ok = results[a.name];
      loginCell += ' <span style="color:' + (ok ? 'var(--green)' : 'var(--red)') + ';font-weight:bold">' + (ok ? '✓' : '✗') + '</span>';
    }
    return '<tr>'
      + '<td>' + esc(a.nickname || '') + '</td>'
      + '<td>' + loginCell + '</td>'
      + '<td><div class="acct-actions">'
      + (a.last_login
          ? '<button class="btn-sm btn-mgmt" onclick="openDashboard(\'' + esc(a.name) + '\')">后台</button>'
          : '<button class="btn-sm btn-mgmt" onclick="loginAccount(\'' + esc(a.name) + '\')">登录</button>')
      + '<button class="btn-sm btn-danger" onclick="deleteAccount(\'' + esc(a.name) + '\')">删除</button>'
      + '</div></td></tr>';
  }).join('');
}

function openAccountManager() {
  document.getElementById('acct-overlay').classList.add('show');
  refreshAccountTable();
}
function closeAccountManager() {
  document.getElementById('acct-overlay').classList.remove('show');
  if (_checkPollTimer) { clearTimeout(_checkPollTimer); _checkPollTimer = null; }
}

let _checkPollTimer = null;
async function checkAccounts() {
  const btn = document.getElementById('check-btn');
  if (!btn) return;
  if (btn.disabled) return;
  btn.disabled = true;
  btn.textContent = '检测中...';
  btn.style.opacity = '0.7';
  btn.style.boxShadow = 'inset 0 2px 4px rgba(0,0,0,.2)';
  btn.style.cursor = 'not-allowed';

  function restoreBtn() {
    btn.disabled = false;
    btn.textContent = '检测';
    btn.style.opacity = '';
    btn.style.boxShadow = '';
    btn.style.cursor = '';
  }

  try {
    const res = await fetch('/api/accounts/check', { method: 'POST' });
    const data = await res.json();
    if (res.status !== 202) { toast(data.error || data.message || '检测启动失败'); restoreBtn(); return; }

    function poll() {
      _checkPollTimer = setTimeout(async () => {
        try {
          const sr = await fetch('/api/accounts/check/status');
          const st = await sr.json();
          refreshAccountTable(st.results);
          if (st.done) {
            await loadAccounts();
            const results = st.results || {};
            const failed = Object.entries(results).filter(([, ok]) => !ok).map(([n]) => n);
            if (failed.length > 0) {
              toast('检测完成，' + failed.length + ' 个账号已失效：' + failed.join('、'));
            } else {
              toast('检测完成，全部有效');
            }
            refreshAccountTable(null);
            renderSidebar();
            restoreBtn();
            return;
          }
          poll();
        } catch (e) { /* retry */ poll(); }
      }, 1500);
    }
    poll();
  } catch (e) {
    toast('检测请求失败');
    restoreBtn();
  }
}

// ==================== 二维码 ====================
let qrcodeTimer = null;
function openQrcodeModal() {
  document.getElementById('qrcode-overlay').classList.add('show');
  document.getElementById('qrcode-img').style.display = 'none';
  document.getElementById('qrcode-spinner').style.display = '';
  document.getElementById('qrcode-status-text').textContent = '正在获取二维码...';
}
function closeQrcodeModal() {
  document.getElementById('qrcode-overlay').classList.remove('show');
  if (qrcodeTimer) { clearTimeout(qrcodeTimer); qrcodeTimer = null; }
  loadAccounts();  // 兜底刷新，确保扫码后列表更新
}
async function cancelScan() {
  await fetch('/api/accounts/add-with-scan/cancel', { method: 'POST' });
  closeQrcodeModal();
}
async function addAccount() {
  openQrcodeModal();
  const res = await fetch('/api/accounts/add-with-scan', { method: 'POST' });
  const data = await res.json();
  if (data.error) { document.getElementById('qrcode-status-text').textContent = data.error; setTimeout(closeQrcodeModal, 2000); return; }
  pollQrcodeStatus();
}
const _qrcodeStatusMap = {
  loading: '正在获取二维码...',
  waiting: '请使用微信扫描二维码',
  scanned: '请使用微信扫描二维码',
  confirming: '请使用微信扫描二维码',
  expired: '二维码已过期，正在刷新...',
  logged_in: '登录成功！',
  timeout: '登录超时',
  cancelled: '已取消',
};
async function pollQrcodeStatus() {
  try {
    const sr = await fetch('/api/qr-login/status');
    const st = await sr.json();
    const img = document.getElementById('qrcode-img');
    const spinner = document.getElementById('qrcode-spinner');
    const statusText = document.getElementById('qrcode-status-text');
    if (st.qrcode) { img.src = st.qrcode; img.style.display = ''; spinner.style.display = 'none'; }
    statusText.textContent = _qrcodeStatusMap[st.status] || st.status;
    if (!st.active) {
      spinner.style.display = 'none';
      if (st.status === 'logged_in') {
        setTimeout(closeQrcodeModal, 1500);
      } else {
        statusText.textContent = st.status === 'timeout' ? '登录超时' :
          st.status === 'cancelled' ? '已取消' : '登录结束';
        setTimeout(closeQrcodeModal, 3000);
      }
      return;
    }
    qrcodeTimer = setTimeout(pollQrcodeStatus, 1000);
  } catch (e) {
    console.error('pollQrcodeStatus 失败:', e);
    qrcodeTimer = setTimeout(pollQrcodeStatus, 1000);
  }
}

async function deleteAccount(name) {
  if (!confirm('确定删除账号 ' + name + '？此操作不删除浏览器数据。')) return;
  await fetch('/api/accounts/' + encodeURIComponent(name), { method: 'DELETE' });
  if (currentAccount === name) currentAccount = '';
  await loadAccounts();
  renderSidebar();
  renderMainContent();
  toast('已删除');
}
async function openDashboard(name) {
  const res = await fetch('/api/accounts/' + encodeURIComponent(name) + '/dashboard', { method: 'POST' });
  const data = await res.json();
  if (data.error) { toast(data.error); return; }
  toast('后台打开中');
}
async function loginAccount(name) {
  const res = await fetch('/api/accounts/' + encodeURIComponent(name) + '/login', { method: 'POST' });
  const data = await res.json();
  if (data.error) { toast(data.error); return; }
  toast('网页打开中，请稍等');
  let lastSeen = null;
  for (let i = 0; i < 60; i++) {
    await new Promise(r => setTimeout(r, 3000));
    await loadAccounts();
    const acct = accounts.find(a => a.name === name);
    const cur = acct ? acct.last_login : '';
    if (cur && cur !== lastSeen) { lastSeen = cur; refreshAccountTable(); }
    if (cur && cur !== '') { toast('登录成功'); break; }
  }
  if (!lastSeen) toast('登录超时，请重试');
}

// ==================== 通用 ====================
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

let debugMode = false;
async function toggleDebug() {
  debugMode = !debugMode;
  const el = document.getElementById('debug-toggle');
  if (el) { el.classList.toggle('active', debugMode); el.textContent = debugMode ? 'debug on' : 'debug'; }
  await fetch('/api/debug', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ debug: debugMode }) });
}

let soundEnabled = true;
function toggleSound() {
  soundEnabled = !soundEnabled;
  const el = document.getElementById('sound-toggle');
  if (el) { el.classList.toggle('active', soundEnabled); el.textContent = soundEnabled ? '提示音' : '已静音'; }
  localStorage.setItem('soundEnabled', soundEnabled ? '1' : '0');
  fetch('/api/config/sound', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ enabled: soundEnabled }) });
}
(async () => {
  const r = await fetch('/api/debug');
  const d = await r.json();
  debugMode = d.debug;
  const el = document.getElementById('debug-toggle');
  if (el) { if (debugMode) el.classList.add('active'); el.textContent = debugMode ? 'debug on' : 'debug'; }

  soundEnabled = localStorage.getItem('soundEnabled') !== '0';
  const soundEl = document.getElementById('sound-toggle');
  if (soundEl) { soundEl.classList.toggle('active', soundEnabled); soundEl.textContent = soundEnabled ? '提示音' : '已静音'; }
  fetch('/api/config/sound', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ enabled: soundEnabled }) });
})();

// ==================== 暗色模式 ====================
(function initTheme() {
  const saved = localStorage.getItem('theme');
  const prefers = window.matchMedia('(prefers-color-scheme:dark)').matches;
  if (saved === 'dark' || (!saved && prefers)) document.documentElement.setAttribute('data-theme', 'dark');
  updateThemeIcon();
})();
function toggleTheme() {
  const el = document.documentElement;
  if (el.hasAttribute('data-theme')) { el.removeAttribute('data-theme'); localStorage.setItem('theme', 'light'); }
  else { el.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark'); }
  updateThemeIcon();
}
function updateThemeIcon() {
  document.getElementById('theme-toggle').textContent = document.documentElement.hasAttribute('data-theme') ? '☀️' : '🌙';
}
</script>
